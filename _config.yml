# Site
title: 码上神域
# subtitle: '张文超博客'
description: 'leftover的个人博客'
keywords: leftover-blog,leftover博客,张文超博客,leftover,博客
author: leftover
language: zh-CN
timezone: 'Asia/Shanghai'

math:
  # every_page: true
# 数学公式
  mathjax:
    enable: true
    # per_page: true
    cdn: 
    tags: none # or 'ams' or 'all'
    single_dollars: true # enable single dollar signs as in-line math delimiters
    cjk_width: 0.9 # relative CJK char width
    normal_width: 0.6 # relative normal (monospace) width
    append_css: true # add CSS to pages rendered by MathJax
    per_page: true # if true, every page will be rendered by MathJax regardless the `mathjax` setting in Front-matter
    packages: # extra packages to load
    extension_options: {}
      # you can put your extension options here
      # see http://docs.mathjax.org/en/latest/options/input/tex.html#tex-extension-options for more detail
  katex:
    enable: false
    # See: https://github.com/KaTeX/KaTeX/tree/master/contrib/copy-tex
    copy_tex: false  
# URL
#if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://blog.leftover.cn/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
# default_category: web前端
# category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'date'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:


theme: yilia-plus
# 配置标签云以及对应的路径,覆盖主题的配置文件里的配置
theme_config:
  aboutme: 'nickname:leftover 🙈<br> school: 井冈山大学计算机科学与技术专业2019级 😲<br/>favorite: 动漫,二次元⚔️,旅游🌄,乒乓球🏓,跑步🏃,捣鼓小玩意🧸 <br/> QQ:1614674987 🐧<br/> wish: 愿以后能够不再为了生活而奔波,做想做的事😉'
  # 有新标签时，需在这里配置
  tags:
    Agent: /tags/Agent
    AI: /tags/AI
    python: /tags/python
    model-optimization: /tags/model-optimization
    mysql: /tags/mysql
    Redis: /tags/redis
    vue: /tags/vue
    react: /tags/react
    javaScript: /tags/javaScript
    node: /tags/node
    html: /tags/html
    css: /tags/css
    哆啦A梦的口袋: /tags/哆啦A梦的口袋
    推荐好文: /tags/推荐好文
    daily: /tags/daily
    git: /tags/git
    前端工程化: /tags/前端工程化
    webpack: /tags/webpack
    部署: /tags/部署
    Linux: /tags/Linux
    hexo: /tags/hexo
    字体图标: /tags/字体图标
    interesting: /tags/interesting
    mac: /tags/mac
