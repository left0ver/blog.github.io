    other: /tags/other
# deploy:
#   type: git
#   repository: root@112.74.50.60:/home/git/blog.git   #用户名@服务器Ip:git仓库位置
#   branch: master
deploy:
  type: git
  repo: git@github.com:left0ver/blog.github.io.git
  branch: docs
  message: updated:{{ now("yyyy-MM-DD HH:mm:ss") }}
# 配置aplayer音乐插件
aplayer:
    meting: true

jsonContent:
    meta: false
    pages: false
    posts:
      title: true
      date: true
      path: true
      text: false
      raw: false
      content: false
      slug: false
      updated: false
      comments: false
      link: false
      permalink: false
      excerpt: false
      categories: false
      tags: true

 